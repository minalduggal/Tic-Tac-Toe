<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="msg-container hide">
      <p id="msg">WINNER</p>
      <button id="new-btn">NEW GAME</button>
    </div>
    <main>
      <h1>Tic Tac Toe</h1>
      <span class="instructions-container">
        <p class="instructions">Click on the boxes to play</p>
        <p class="instructions">Player 1: O</p>
        <p class="instructions">Player 2: X</p>
        <p class="instructions">Whoever wins starts first</p>
      </span>
      <span class="turn-score-container">
        <div id="turn">O's Turn</div>
        <div class="scoreboard">
          <p id="score">O: 0 | X: 0 | Draws: 0</p>
        </div>
      </span>
      <div class="container">
        <div class="board">
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
        </div>
      </div>
      <button id="reset-btn">Reset Game</button>
    </main>
    <script src="app.js"></script>
  </body>
</html>
